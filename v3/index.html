<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncFocus v3 - 極限集中タイマー</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
</head>
<body id="app-body">
    <!-- よそ見警告オーバーレイ -->
    <div id="warning-overlay" class="warning-overlay hidden">
        <div class="warning-content">
            <span class="material-symbols-rounded warning-icon">warning</span>
            <h2>よそ見を検知しました！</h2>
            <p>集中モード作動中です。元の画面に戻って作業を続けてください。</p>
            <button id="resume-btn" class="resume-btn">集中に戻る</button>
        </div>
    </div>

    <div class="ambient-background">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <header>
        <div class="logo">
            <span class="material-symbols-rounded logo-icon">center_focus_strong</span>
            SyncFocus <span class="badge">v3</span>
        </div>
        <div class="header-right">
            <div class="user-status">
                <span class="pulse"></span>オンライン: <span id="online-count">87</span>人
            </div>
        </div>
    </header>

    <main class="container">
        <!-- 左側：自分のタイマー -->
        <div class="left-column">
            <section class="glass-panel timer-section" id="setup-section">
                <div class="panel-header">
                    <h1>何を達成しますか？</h1>
                    <p class="subtitle">AIがあなたのタスクを「すぐ終わるサイズ」に分解します。</p>
                </div>

                <div class="setup-container">
                    <div class="input-group">
                        <span class="material-symbols-rounded input-icon">edit_square</span>
                        <input type="text" id="task-input" placeholder="例: レポートの構成を考える" autocomplete="off">
                    </div>
                    
                    <button id="ai-breakdown-btn" class="ai-btn glow-effect">
                        <span class="material-symbols-rounded">auto_awesome</span>
                        AIでタスクを極小化する
                    </button>

                    <!-- AIによる分解結果 -->
                    <div id="ai-steps-container" class="ai-steps-container hidden">
                        <h3>AIが提案する極小ステップ</h3>
                        <ul id="ai-steps-list" class="steps-list">
                            <!-- ステップが追加される -->
                        </ul>
                        <button id="start-btn" class="primary-btn glow-effect mt-1">
                            <span class="material-symbols-rounded">play_arrow</span>
                            このステップで集中開始
                        </button>
                    </div>
                </div>
            </section>

            <!-- 集中モード画面 -->
            <section class="glass-panel active-timer-container hidden" id="active-timer-container">
                <div class="timer-mode-badge strict-badge" id="timer-mode-badge">
                    <span class="material-symbols-rounded">visibility</span> 
                    よそ見監視モード動作中
                </div>
                
                <h2 id="current-step-display" class="task-title">ステップ名</h2>
                <p id="remaining-steps-display" class="remaining-steps">全3ステップ中 1つ目</p>
                
                <div class="timer-circle">
                    <svg class="progress-ring" width="200" height="200">
                        <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="transparent" r="90" cx="100" cy="100"/>
                        <circle class="progress-ring__circle" id="timer-ring" stroke="url(#gradient)" stroke-width="8" fill="transparent" r="90" cx="100" cy="100"/>
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#3b82f6" />
                                <stop offset="100%" stop-color="#8b5cf6" />
                            </linearGradient>
                            <linearGradient id="gradient-warning" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#ef4444" />
                                <stop offset="100%" stop-color="#f97316" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="timer-display" id="timer-display">05:00</div>
                </div>

                <div class="controls">
                    <button id="complete-step-btn" class="success-btn">
                        <span class="material-symbols-rounded">check_circle</span>
                        ステップ完了！
                    </button>
                    <button id="stop-btn" class="secondary-btn">やめる</button>
                </div>
            </section>
            
            <!-- 達成記録 -->
            <section class="glass-panel stats-section">
                <div class="stats-header">
                    <span class="material-symbols-rounded">emoji_events</span>
                    <h3>今日の達成記録</h3>
                </div>
                <div class="stats-content">
                    <div class="stat-box">
                        <div class="stat-value" id="today-focus-time">0<span class="unit">分</span></div>
                        <div class="stat-label">合計集中時間</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="today-tasks-completed">0<span class="unit">個</span></div>
                        <div class="stat-label">完了ステップ</div>
                    </div>
                </div>
            </section>
        </div>

        <!-- 右側：みんなのフィード -->
        <section class="glass-panel feed-section">
            <div class="feed-header">
                <h2>みんなのリアルタイム宣言</h2>
                <span class="live-badge"><span class="pulse-small"></span>LIVE</span>
            </div>
            <div class="feed-list" id="feed-list">
                <!-- フィードアイテムがJSで追加されます -->
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
